<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Đăng Ký</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://use.fontawesome.com/releases/v5.7.2/css/all.css" rel="stylesheet" integrity="sha384-7gJGTZ7r6d3h6uFq2tlgWkeVgFSAk92G9E0PsH4FHp7AEyG2wplI23c6j/w6q4Nz" crossorigin="anonymous">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</head>
<body>
  <h1>Đăng Ký Người Dùng Mới</h1>
  <div class="container">
    <form action="#" th:action="@{/register/process}" th:object="${userregister}" method="post">
      <div th:if="${myerror}">
        <span th:text="${myerror}" class="alert alert-danger"></span>
      </div>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Tên đăng nhập" th:field="*{username}"/>
        <div th:if="${#fields.hasErrors('username')}">
          <ul>
            <li th:each="e : ${#fields.errors('username')}" th:text="${e}"></li>
          </ul>
        </div>
      </div>
      <div class="mb-3">
        <input type="password" class="form-control" placeholder="Mật khẩu" th:field="*{password}"/>
        <div th:if="${#fields.hasErrors('password')}">
          <ul>
            <li th:each="e : ${#fields.errors('password')}" th:text="${e}"></li>
          </ul>
        </div>
      </div>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Tên" th:field="*{firstname}"/>
        <div th:if="${#fields.hasErrors('firstname')}">
          <ul>
            <li th:each="e : ${#fields.errors('firstname')}" th:text="${e}"></li>
          </ul>
        </div>
      </div>
      <div class="mb-3">
        <input type="text" class="form-control" placeholder="Họ" th:field="*{lastname}"/>
        <div th:if="${#fields.hasErrors('lastname')}">
          <ul>
            <li th:each="e : ${#fields.errors('lastname')}" th:text="${e}"></li>
          </ul>
        </div>
      </div>
      <div class="mb-3">
        <input type="email" class="form-control" placeholder="Email" th:field="*{email}"/>
        <div th:if="${#fields.hasErrors('email')}">
          <ul>
            <li th:each="e : ${#fields.errors('email')}" th:text="${e}"></li>
          </ul>
        </div>
      </div>
      <div>
        <button type="submit" class="btn btn-success">Đăng Ký</button>
      </div>
    </form>
  </div>
</body>
</html>
